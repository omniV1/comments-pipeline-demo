<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Application</title>
    <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>
<div class="container">
  <h1>Welcome to the comments application!</h1>

  <form th:action="@{/}" method="get" class="search-form">
    <div class="mb-3">
      <label for="search" class="form-label">Search Comments</label>
      <div class="search-row">
        <input type="text" class="form-control" id="search" name="search"
               th:value="${search}" placeholder="Search by author or content...">
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/}" class="btn btn-secondary">Clear</a>
      </div>
    </div>
  </form>

  <p class="result-count" th:text="'Showing ' + ${showing} + ' of ' + ${total} + ' comments'">
    Showing 3 of 3 comments
  </p>

  <table class="table">
    <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Author</th>
        <th scope="col">Comment</th>
        <th scope="col">Submitted at</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="comment : ${comments}">
        <td th:text="${comment.id}">1</td>
        <td th:text="${comment.author}">Alice</td>
        <td th:text="${comment.content}">Sample comment content</td>
        <td th:text="${comment.formattedDate}">Apr 07, 2026 02:00 PM</td>
      </tr>
    </tbody>
  </table>

  <form th:action="@{/submitComment}" method="post">
    <div class="mb-3">
      <label for="content" class="form-label">New Comment</label>
      <input type="text" class="form-control" id="content" name="content" required>
    </div>
    <div class="mb-3">
      <label for="author" class="form-label">Your name</label>
      <input type="text" class="form-control" id="author" name="author" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Comment</button>
  </form>
</div>
</body>
</html>
